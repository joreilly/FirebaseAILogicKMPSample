name: iOS CI

on: pull_request

# Cancel any current or previous job from the same PR
concurrency:
  group: ios-${{ github.head_ref }}
  cancel-in-progress: true


jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Set Xcode Version 26.6
        shell: bash
        run: |
          xcodes select 26.6

      # Firebase config isn't committed; write a placeholder so the build
      # (which never runs Firebase) can compile. Real config is supplied locally.
      - name: Create placeholder GoogleService-Info.plist
        run: |
          cat > iosApp/GoogleService-Info.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          	<key>API_KEY</key>
          	<string>placeholder</string>
          	<key>GCM_SENDER_ID</key>
          	<string>000000000000</string>
          	<key>BUNDLE_ID</key>
          	<string>dev.johnoreilly.vertexai</string>
          	<key>PROJECT_ID</key>
          	<string>placeholder-ci</string>
          	<key>STORAGE_BUCKET</key>
          	<string>placeholder-ci.appspot.com</string>
          	<key>GOOGLE_APP_ID</key>
          	<string>1:000000000000:ios:0000000000000000</string>
          	<key>IS_ADS_ENABLED</key>
          	<false/>
          	<key>IS_ANALYTICS_ENABLED</key>
          	<false/>
          	<key>IS_APPINVITE_ENABLED</key>
          	<true/>
          	<key>IS_GCM_ENABLED</key>
          	<true/>
          	<key>IS_SIGNIN_ENABLED</key>
          	<true/>
          </dict>
          </plist>
          PLIST
      - name: Build iOS app
        run: xcodebuild -allowProvisioningUpdates -workspace iosApp/iosApp.xcodeproj/project.xcworkspace -configuration Debug -scheme iosApp -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' ARCHS=arm64 EXCLUDED_ARCHS=x86_64



